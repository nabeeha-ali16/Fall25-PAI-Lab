<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlagiaScope — AI Plagiarism Detection</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0f17;
    --card:#111827cc;
    --accent:#7c5cff;
    --accent2:#22d3ee;
    --text:#e5e7eb;
    --muted:#9ca3af;
    --border:#1f2937;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
    background: radial-gradient(circle at top,#111827,#0b0f17);
    color:var(--text);
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    align-items:center;
}

.brand{
    font-weight:700;
    font-size:20px;
    letter-spacing:.5px;
}

.badge{
    padding:6px 12px;
    border:1px solid var(--border);
    border-radius:999px;
    font-size:12px;
    color:var(--muted);
}

.hero{
    text-align:center;
    padding:60px 20px 30px;
}

.hero h1{
    font-size:52px;
    font-weight:800;
    line-height:1.1;
}

.hero span{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    margin-top:15px;
    color:var(--muted);
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}

.card{
    margin:40px auto;
    width:90%;
    max-width:800px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:25px;
    backdrop-filter: blur(10px);
}

textarea{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#0f172a;
    color:white;
    resize:none;
    outline:none;
}

.upload{
    margin-top:15px;
    border:2px dashed var(--border);
    padding:20px;
    border-radius:12px;
    text-align:center;
    color:var(--muted);
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:600;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="navbar">
    <div class="brand">PlagiaScope</div>
    <div class="badge">AI Powered NLP</div>
</div>

<div class="hero">
    <h1>Detect Plagiarism with <span>AI Precision</span></h1>
    <p>Upload text or documents and get instant similarity analysis using TF-IDF + Cosine Similarity engine.</p>
</div>

<div class="card">
    <form method="POST" action="/check" enctype="multipart/form-data">
        <textarea name="text" rows="6" placeholder="Paste your content here..."></textarea>

        <div class="upload">
            Upload file (.txt, .pdf, .docx)
            <input type="file" name="file">
        </div>

        <button type="submit">Analyze Content</button>
    </form>
</div>

</body>
</html>
