<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Concierge AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #f5f0e8;
      --warm-off: #ede8dc;
      --gold:     #c9a96e;
      --gold-dk:  #a8813f;
      --charcoal: #2a2520;
      --muted:    #7a6f62;
      --line:     rgba(201,169,110,.25);
      --bubble-user: #2a2520;
      --bubble-bot:  #ffffff;
      --shadow:   0 8px 40px rgba(42,37,32,.12);
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--charcoal);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,169,110,.18) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a96e' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 780px;
      padding: 52px 32px 28px;
      text-align: center;
    }

    .hotel-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--gold);
      border-radius: 40px;
      padding: 6px 18px;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold-dk);
      margin-bottom: 20px;
    }

    .hotel-badge span { font-size: 14px; }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 300;
      line-height: 1.15;
      color: var(--charcoal);
      margin-bottom: 10px;
    }

    h1 em {
      font-style: italic;
      color: var(--gold-dk);
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: .3px;
    }

    /* ── Chat container ── */
    .chat-wrapper {
      width: 100%;
      max-width: 780px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 20px 20px;
    }

    .chat-box {
      flex: 1;
      background: white;
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 420px;
      max-height: 58vh;
    }

    /* Chat scroll area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    /* Welcome message */
    .welcome-msg {
      text-align: center;
      padding: 20px 0 10px;
    }

    .welcome-msg .icon {
      font-size: 36px;
      display: block;
      margin-bottom: 10px;
    }

    .welcome-msg p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Messages */
    .msg-row {
      display: flex;
      gap: 12px;
      animation: fadeUp .35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.bot  { background: var(--gold);   }
    .avatar.user { background: var(--charcoal); }

    .bubble {
      max-width: 70%;
      padding: 13px 17px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.6;
    }

    .bubble.user {
      background: var(--bubble-user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      background: var(--bubble-bot);
      border: 1px solid var(--line);
      color: var(--charcoal);
      border-bottom-left-radius: 4px;
    }

    /* Result cards inside bot bubble */
    .result-card {
      margin-top: 10px;
      background: var(--warm-off);
      border-left: 3px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 12px 14px;
    }

    .result-card:first-of-type { margin-top: 14px; }

    .result-card .q-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--gold-dk);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-card .category-pill {
      background: var(--gold);
      color: white;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .result-card .matched-q {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .result-card .answer-text {
      font-size: 14px;
      color: var(--charcoal);
      line-height: 1.65;
    }

    .result-card .confidence {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .confidence-bar {
      height: 3px;
      background: var(--line);
      border-radius: 3px;
      margin-top: 3px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dk), var(--gold));
      border-radius: 3px;
      transition: width .6s ease;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }

    .typing span {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }

    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--line);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: white;
    }

    #user-input {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--charcoal);
      background: var(--cream);
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color .2s;
      line-height: 1.5;
    }

    #user-input:focus { border-color: var(--gold); }
    #user-input::placeholder { color: #b5a89a; }

    #send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--charcoal);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }

    #send-btn:hover  { background: var(--gold-dk); }
    #send-btn:active { transform: scale(.94); }

    #send-btn svg { width: 18px; height: 18px; }

    /* ── Quick suggestions ── */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px 20px 0;
      max-width: 780px;
      width: 100%;
      align-self: flex-start;
    }

    .suggestion-chip {
      background: white;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 7px 16px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .suggestion-chip:hover {
      border-color: var(--gold);
      color: var(--gold-dk);
      background: var(--warm-off);
    }

    /* ── Footer ── */
    footer {
      font-size: 11.5px;
      color: #b5a89a;
      letter-spacing: .4px;
      padding: 16px 0 28px;
      text-align: center;
    }

    footer strong { color: var(--gold-dk); font-weight: 500; }

    /* ── Error state ── */
    .error-bubble {
      background: #fff5f5;
      border: 1px solid #ffcccc;
      color: #b00;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="hotel-badge"><span>🏨</span> Concierge Intelligence</div>
    <h1>Ask our <em>AI Concierge</em></h1>
    <p class="subtitle">Powered by Hugging Face MiniLM · FAISS Semantic Search · Flask</p>
  </header>

  <!-- Quick suggestion chips -->
  <div class="suggestions" id="suggestion-row">
    <button class="suggestion-chip" onclick="askSuggestion(this)">Check-in time</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">Room service hours</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">Is parking free?</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">Airport transfer</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">Cancellation policy</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">Pets allowed?</button>
  </div>

  <!-- Chat window -->
  <div class="chat-wrapper">
    <div class="chat-box">
      <div class="messages" id="messages">
        <div class="welcome-msg">
          <span class="icon">✨</span>
          <p>Good day. How may I assist you today?</p>
        </div>
      </div>

      <div class="input-area">
        <textarea id="user-input" rows="1" placeholder="Ask anything about our hotel…"></textarea>
        <button id="send-btn" onclick="sendQuery()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <footer>Lab 12 · Hotel QnA Bot · <strong>MiniLM + FAISS + Flask</strong></footer>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');

  /* Auto-grow textarea */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  /* Send on Enter (Shift+Enter = newline) */
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  });

  function askSuggestion(btn) {
    inputEl.value = btn.textContent.trim();
    sendQuery();
  }

  function appendMsg(role, html) {
    const isUser = role === 'user';
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = isUser ? '👤' : '🏨';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = html;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🏨';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  function buildResultHTML(results) {
    if (!results.length) {
      return `<p>I'm sorry, I couldn't find a matching answer. Please try rephrasing your question.</p>`;
    }

    /* Show best result prominently, others as secondaries */
    const [best, ...rest] = results;

    let html = `<p style="font-size:13px;color:var(--muted);margin-bottom:8px;">Here's what I found:</p>`;

    const card = (r, primary) => `
      <div class="result-card" ${primary ? '' : 'style="opacity:.85;margin-top:8px;"'}>
        <div class="q-label">
          <span>${primary ? 'Best Match' : `Match #${r.rank}`}</span>
          <span class="category-pill">${r.category}</span>
        </div>
        <div class="matched-q">"${r.question}"</div>
        <div class="answer-text">${r.answer}</div>
        <div class="confidence">Confidence
          <div class="confidence-bar">
            <div class="confidence-fill" style="width:${Math.min(r.confidence, 100)}%"></div>
          </div>
        </div>
      </div>`;

    html += card(best, true);

    if (rest.length) {
      html += `<details style="margin-top:12px;font-size:12.5px;color:var(--muted);cursor:pointer;">
        <summary style="list-style:none;display:flex;align-items:center;gap:6px;">
          <span>▸</span> See ${rest.length} more related answer${rest.length > 1 ? 's' : ''}
        </summary>
        ${rest.map(r => card(r, false)).join('')}
      </details>`;
    }

    return html;
  }

  async function sendQuery() {
    const query = inputEl.value.trim();
    if (!query) return;

    /* Show user bubble */
    appendMsg('user', `<p>${escapeHtml(query)}</p>`);

    /* Clear input */
    inputEl.value = '';
    inputEl.style.height = 'auto';

    /* Typing indicator */
    showTyping();

    try {
      const res  = await fetch('/ask', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ query })
      });
      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendMsg('bot', `<p class="error-bubble">${escapeHtml(data.error)}</p>`);
      } else {
        appendMsg('bot', buildResultHTML(data.results || []));
      }
    } catch (err) {
      removeTyping();
      appendMsg('bot', `<p>Something went wrong. Please make sure the Flask server is running.</p>`);
    }
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
