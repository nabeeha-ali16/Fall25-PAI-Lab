<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Profiling System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #d3cca5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #bebf94;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }
        h2 { color: #333333; margin-bottom: 25px; }
        img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 3px solid #32659f;
            object-fit: cover;
            margin-bottom: 20px;
            display: none;
        }
        h3 { color: #4a90e2; font-weight: 500; margin-top: 0; }
        input[type="file"] { margin-bottom: 15px; }
        button {
            padding: 10px 20px;
            background-color: #32659f;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: #27476e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Face Profiling System</h2>

        <!-- Upload Form -->
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <br>
            <button type="submit">Upload & Analyze</button>
        </form>

        <!-- Processed Image -->
        <img id="profileImage" src="" alt="Profile Image">

        <!-- Profile Text -->
        <h3 id="profileText"></h3>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const profileImage = document.getElementById('profileImage');
        const profileText = document.getElementById('profileText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if(result.error){
                alert(result.error);
            } else {
                profileImage.src = '/' + result.image;
                profileImage.style.display = 'block';
                profileText.textContent = result.profile;
            }
        });
    </script>
</body>
</html>
